version: 2
updates:
  # 1. بۆ ئەدمین پانێڵ - React
    - package-ecosystem: "npm"
    directory: "/admin-panel"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
            - "AliBlbas"
    commit-message:
      prefix: "chore(deps):"

  # 2. بۆ باکێند - API
    - package-ecosystem: "npm"
    directory: "/backend-api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
            - "AliBlbas"
    commit-message:
      prefix: "chore(deps):"

  # 3. بۆ GitHub Actions
    - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 3
